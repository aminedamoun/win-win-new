[build]
publish = "dist"
command = "npm run build"

[[redirects]]
from = "/index-sl.html"
to = "/"
status = 301

[[redirects]]
from = "/admin/applications"
to = "/admin/applications.html"
status = 200

[[redirects]]
from = "/admin"
to = "/admin/index.html"
status = 200

[[redirects]]
from = "/admin/"
to = "/admin/index.html"
status = 200